<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beltway HyperFlow PC Monitor</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Import Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121e;
            --card-bg: rgba(22, 22, 37, 0.65);
            --card-border: rgba(255, 255, 255, 0.07);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            /* Color system for RX (Incoming) */
            --color-rx: #00e676;
            --color-rx-glow: rgba(0, 230, 118, 0.15);
            --color-rx-border: rgba(0, 230, 118, 0.3);
            
            /* Color system for TX (Outgoing) */
            --color-tx: #00e5ff;
            --color-tx-glow: rgba(0, 229, 255, 0.15);
            --color-tx-border: rgba(0, 229, 255, 0.3);
            
            --accent-purple: #7c4dff;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.5);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.6);
            --shadow-neon-rx: 0 0 15px rgba(0, 230, 118, 0.2);
            --shadow-neon-tx: 0 0 15px rgba(0, 229, 255, 0.2);
            --radius-lg: 16px;
            --radius-md: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 30%, #151528 0%, var(--bg-primary) 80%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Glassmorphism Panel Common Class */
        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--shadow-md);
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* HEADER SECTION */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 10px 5px;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--color-rx), var(--color-tx));
            border-radius: var(--radius-md);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .brand-logo i {
            font-size: 22px;
            color: #05050a;
            z-index: 2;
        }

        .brand-logo::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg);
            animation: logo-shimmer 3s infinite;
        }

        @keyframes logo-shimmer {
            0% { transform: translate(-50%, -50%) rotate(45deg); }
            100% { transform: translate(50%, 50%) rotate(45deg); }
        }

        .brand-text h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-text p {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 2px;
        }

        /* Badge Status & Controls */
        .controls-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* Status Pill Badge */
        .status-badge {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94a3b8;
            box-shadow: 0 0 8px #94a3b8;
            display: inline-block;
        }

        .status-badge.connected .status-dot {
            background: #00e676;
            box-shadow: 0 0 10px #00e676;
            animation: led-pulse 1.8s infinite alternate;
        }

        .status-badge.simulated {
            border-color: rgba(255, 152, 0, 0.3);
            background: rgba(255, 152, 0, 0.05);
        }
        
        .status-badge.simulated .status-dot {
            background: #ff9800;
            box-shadow: 0 0 10px #ff9800;
            animation: led-pulse-orange 1.8s infinite alternate;
        }

        @keyframes led-pulse {
            0% { opacity: 0.4; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }
        @keyframes led-pulse-orange {
            0% { opacity: 0.4; transform: scale(0.9); box-shadow: 0 0 4px #ff9800; }
            100% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 12px #ff9800; }
        }

        /* Premium Segmented Switch */
        .segmented-control {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 4px;
            border-radius: 30px;
            display: flex;
            position: relative;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }

        .segment-btn {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1;
        }

        .segment-btn.active {
            color: #05050a;
            background: #ffffff;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
            font-weight: 700;
        }

        /* STATS GRID SECTION */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Specific card hover states and glowing edges */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: transparent;
            transition: all 0.3s ease;
        }

        .card.incoming-card::before {
            background: linear-gradient(to right, var(--color-rx), transparent);
        }

        .card.outgoing-card::before {
            background: linear-gradient(to right, var(--color-tx), transparent);
        }

        .card.incoming-card:hover {
            border-color: var(--color-rx-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), var(--color-rx-glow);
            transform: translateY(-2px);
        }

        .card.outgoing-card:hover {
            border-color: var(--color-tx-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), var(--color-tx-glow);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title i {
            font-size: 14px;
        }

        .incoming-card .card-title i {
            color: var(--color-rx);
            text-shadow: var(--shadow-neon-rx);
        }

        .outgoing-card .card-title i {
            color: var(--color-tx);
            text-shadow: var(--shadow-neon-tx);
        }

        .pulse-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: transparent;
            transition: all 0.2s ease;
        }

        /* Pulsing indicator on updates */
        .incoming-card.updating .pulse-indicator {
            background: var(--color-rx);
            box-shadow: 0 0 10px var(--color-rx);
        }

        .outgoing-card.updating .pulse-indicator {
            background: var(--color-tx);
            box-shadow: 0 0 10px var(--color-tx);
        }

        /* Large Speed Display Box */
        .speed-display-wrapper {
            margin: 5px 0;
            display: flex;
            flex-direction: column;
        }

        .speed-main {
            font-family: 'JetBrains Mono', monospace;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1.5px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            line-height: 1;
        }

        .incoming-card .speed-main {
            color: #ffffff;
            text-shadow: 0 2px 20px rgba(0, 230, 118, 0.1);
        }

        .outgoing-card .speed-main {
            color: #ffffff;
            text-shadow: 0 2px 20px rgba(0, 229, 255, 0.1);
        }

        .speed-main .speed-unit {
            font-size: 18px;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            color: var(--text-secondary);
            letter-spacing: 0;
        }

        /* Secondary speed unit underneath */
        .speed-secondary {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .speed-secondary i {
            font-size: 11px;
            opacity: 0.7;
        }

        /* Card session statistics sub-grid */
        .session-stats-grid {
            grid-template-columns: repeat(2, 1fr);
            display: grid;
            gap: 12px;
            margin-top: 10px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sub-stat-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sub-stat-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .sub-stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* CHART SECTION */
        .chart-panel {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart-panel-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-panel-title i {
            color: var(--accent-purple);
        }

        .chart-legend {
            display: flex;
            gap: 15px;
            font-size: 12px;
            font-weight: 600;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .legend-rx { background: var(--color-rx); box-shadow: 0 0 6px var(--color-rx); }
        .legend-tx { background: var(--color-tx); box-shadow: 0 0 6px var(--color-tx); }

        .chart-container {
            position: relative;
            width: 100%;
            height: 250px;
        }

        /* Responsive styling adjustments */
        @media (max-width: 640px) {
            body {
                padding: 15px 10px;
            }
            .container {
                gap: 15px;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .controls-container {
                width: 100%;
                justify-content: space-between;
            }
            .segmented-control {
                width: auto;
            }
            .speed-main {
                font-size: 34px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Dashboard Header -->
        <header>
            <div class="brand-container">
                <div class="brand-logo">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div class="brand-text">
                    <h1>HyperFlow <span style="font-weight:300; font-size: 18px; color: var(--text-secondary)">Monitor</span></h1>
                    <p>Real-Time Network Bandwidth Console</p>
                </div>
            </div>
            
            <div class="controls-container">
                <!-- Connection & Interface Badge -->
                <div id="conn-badge" class="status-badge">
                    <span class="status-dot"></span>
                    <span id="conn-status-text">Menghubungkan...</span>
                </div>

                <!-- Unit Segmented Switch (Bytes vs bits) -->
                <div class="segmented-control">
                    <button id="btn-bytes" class="segment-btn active" onclick="changePrimaryUnit('Bytes')">
                        <i class="fa-solid fa-hard-drive"></i> Bytes
                    </button>
                    <button id="btn-bits" class="segment-btn" onclick="changePrimaryUnit('bits')">
                        <i class="fa-solid fa-network-wired"></i> bits
                    </button>
                </div>
            </div>
        </header>

        <!-- Stats Grid (Incoming vs Outgoing) -->
        <div class="stats-grid">
            <!-- Incoming Card -->
            <div class="glass-panel card incoming-card" id="incoming-card">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fa-solid fa-cloud-arrow-down"></i> Incoming Traffic
                    </div>
                    <div class="pulse-indicator"></div>
                </div>
                <div class="speed-display-wrapper">
                    <div class="speed-main">
                        <span id="rx-main-val">0.00</span>
                        <span class="speed-unit" id="rx-main-unit">MB/s</span>
                    </div>
                    <div class="speed-secondary">
                        <i class="fa-solid fa-shuffle"></i>
                        <span id="rx-secondary-val">0.00 Mbps</span>
                    </div>
                </div>
                
                <!-- Session Metrics -->
                <div class="session-stats-grid">
                    <div class="sub-stat-box">
                        <span class="sub-stat-label">Session Avg</span>
                        <span class="sub-stat-value" id="rx-avg-val">0.00 KB/s</span>
                    </div>
                    <div class="sub-stat-box" style="text-align: right;">
                        <span class="sub-stat-label">Session Peak</span>
                        <span class="sub-stat-value" id="rx-peak-val">0.00 KB/s</span>
                    </div>
                </div>
            </div>

            <!-- Outgoing Card -->
            <div class="glass-panel card outgoing-card" id="outgoing-card">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Outgoing Traffic
                    </div>
                    <div class="pulse-indicator"></div>
                </div>
                <div class="speed-display-wrapper">
                    <div class="speed-main">
                        <span id="tx-main-val">0.00</span>
                        <span class="speed-unit" id="tx-main-unit">MB/s</span>
                    </div>
                    <div class="speed-secondary">
                        <i class="fa-solid fa-shuffle"></i>
                        <span id="tx-secondary-val">0.00 Mbps</span>
                    </div>
                </div>

                <!-- Session Metrics -->
                <div class="session-stats-grid">
                    <div class="sub-stat-box">
                        <span class="sub-stat-label">Session Avg</span>
                        <span class="sub-stat-value" id="tx-avg-val">0.00 KB/s</span>
                    </div>
                    <div class="sub-stat-box" style="text-align: right;">
                        <span class="sub-stat-label">Session Peak</span>
                        <span class="sub-stat-value" id="tx-peak-val">0.00 KB/s</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Real-Time Chart Panel -->
        <div class="glass-panel chart-panel">
            <div class="chart-header">
                <div class="chart-panel-title">
                    <i class="fa-solid fa-wave-square"></i> Live Traffic Profile
                </div>
                <div class="chart-legend">
                    <div class="legend-item">
                        <span class="legend-dot legend-rx"></span>
                        <span>Incoming</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot legend-tx"></span>
                        <span>Outgoing</span>
                    </div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="trafficChart"></canvas>
            </div>
        </div>
    </div>

<script>
    // Inisialisasi Socket
    const socket = io();
    
    // Preferensi Unit Utama (diambil dari localStorage atau default 'Bytes')
    let primaryUnit = localStorage.getItem('hyperflow_primary_unit') || 'Bytes';
    
    // Simpan data historis mentah (Bytes/s) untuk mengganti skala grafik secara dinamis
    const rawRxPoints = [];
    const rawTxPoints = [];
    const chartLabels = Array(20).fill('');
    
    // Statistik akumulasi untuk rata-rata dan puncak sesi (dalam unit Bytes)
    let sessionRxTotal = 0;
    let sessionTxTotal = 0;
    let sessionTickCount = 0;
    
    let rxPeakBytes = 0;
    let txPeakBytes = 0;

    // Set button active di segmented control secara visual sesuai unit tersimpan
    updateUnitButtonsUI();

    // Setup Canvas dan Chart.js
    const ctx = document.getElementById('trafficChart').getContext('2d');
    
    // Inisialisasi gradien warna garis
    const rxGradient = ctx.createLinearGradient(0, 0, 0, 240);
    rxGradient.addColorStop(0, 'rgba(0, 230, 118, 0.28)');
    rxGradient.addColorStop(1, 'rgba(0, 230, 118, 0.00)');

    const txGradient = ctx.createLinearGradient(0, 0, 0, 240);
    txGradient.addColorStop(0, 'rgba(0, 229, 255, 0.28)');
    txGradient.addColorStop(1, 'rgba(0, 229, 255, 0.00)');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: chartLabels,
            datasets: [
                {
                    label: 'Incoming',
                    borderColor: '#00e676',
                    backgroundColor: rxGradient,
                    borderWidth: 2.5,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    pointBackgroundColor: '#00e676',
                    data: Array(20).fill(0),
                    fill: true,
                    tension: 0.4
                },
                {
                    label: 'Outgoing',
                    borderColor: '#00e5ff',
                    backgroundColor: txGradient,
                    borderWidth: 2.5,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    pointBackgroundColor: '#00e5ff',
                    data: Array(20).fill(0),
                    fill: true,
                    tension: 0.4
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(15, 15, 27, 0.92)',
                    titleFont: { family: 'Outfit', size: 12, weight: '700' },
                    bodyFont: { family: 'JetBrains Mono', size: 13 },
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                    borderWidth: 1,
                    padding: 10,
                    cornerRadius: 8,
                    displayColors: true,
                    callbacks: {
                        label: function(context) {
                            const val = context.parsed.y;
                            const unitLabel = primaryUnit === 'Bytes' ? ' MB/s' : ' Mbps';
                            return ' ' + context.dataset.label + ': ' + val.toFixed(2) + unitLabel;
                        }
                    }
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: { display: false }
                },
                y: {
                    beginAtZero: true,
                    grid: {
                        color: 'rgba(255, 255, 255, 0.035)',
                        lineWidth: 1
                    },
                    ticks: {
                        color: '#94a3b8',
                        font: { family: 'Outfit', size: 11 },
                        callback: function(value) {
                            return value.toFixed(1);
                        }
                    },
                    title: {
                        display: true,
                        text: primaryUnit === 'Bytes' ? 'Speed (MB/s)' : 'Speed (Mbps)',
                        color: '#94a3b8',
                        font: { family: 'Outfit', size: 12, weight: '600' }
                    }
                }
            }
        }
    });

    // FUNGSI UTAMA: Konversi unit Bytes/s atau bits/s otomatis (Auto Scaling)
    function formatSpeed(bytesPerSec, type = 'Bytes', decimals = 2) {
        if (type === 'Bytes') {
            const val = bytesPerSec;
            if (val <= 0) return { value: '0.00', unit: 'B/s' };
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['B/s', 'KB/s', 'MB/s', 'GB/s', 'TB/s'];
            const i = Math.floor(Math.log(val) / Math.log(k));
            const safeIndex = Math.min(i, sizes.length - 1);
            return {
                value: (val / Math.pow(k, safeIndex)).toFixed(dm),
                unit: sizes[safeIndex],
                display: (val / Math.pow(k, safeIndex)).toFixed(dm) + ' ' + sizes[safeIndex]
            };
        } else {
            // bits/s (1 Byte = 8 bits, standard networking uses 1000 base for bits)
            const val = bytesPerSec * 8;
            if (val <= 0) return { value: '0.00', unit: 'bps' };
            const k = 1000;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['bps', 'Kbps', 'Mbps', 'Gbps', 'Tbps'];
            const i = Math.floor(Math.log(val) / Math.log(k));
            const safeIndex = Math.min(i, sizes.length - 1);
            return {
                value: (val / Math.pow(k, safeIndex)).toFixed(dm),
                unit: sizes[safeIndex],
                display: (val / Math.pow(k, safeIndex)).toFixed(dm) + ' ' + sizes[safeIndex]
            };
        }
    }

    // Update UI Segmented Control
    function updateUnitButtonsUI() {
        if (primaryUnit === 'Bytes') {
            document.getElementById('btn-bytes').classList.add('active');
            document.getElementById('btn-bits').classList.remove('active');
        } else {
            document.getElementById('btn-bits').classList.add('active');
            document.getElementById('btn-bytes').classList.remove('active');
        }
    }

    // Event Handler saat unit utama diubah
    function changePrimaryUnit(unit) {
        if (primaryUnit === unit) return;
        primaryUnit = unit;
        localStorage.setItem('hyperflow_primary_unit', unit);
        
        updateUnitButtonsUI();
        
        // Perbarui label sumbu Y pada chart
        chart.options.scales.y.title.text = primaryUnit === 'Bytes' ? 'Speed (MB/s)' : 'Speed (Mbps)';
        
        // Gambar ulang grafik dengan mengonversi ulang data historis yang tersimpan
        renderChartData();
    }

    // Map data raw (Bytes/s) ke unit visual grafik (MB/s atau Mbps)
    function renderChartData() {
        const mappedRx = rawRxPoints.map(v => {
            if (primaryUnit === 'Bytes') {
                return v / (1024 * 1024); // ke MB/s
            } else {
                return (v * 8) / 1000000; // ke Mbps
            }
        });

        const mappedTx = rawTxPoints.map(v => {
            if (primaryUnit === 'Bytes') {
                return v / (1024 * 1024); // ke MB/s
            } else {
                return (v * 8) / 1000000; // ke Mbps
            }
        });

        chart.data.datasets[0].data = mappedRx;
        chart.data.datasets[1].data = mappedTx;
        chart.update('none'); // Update tanpa animasi agar sangat responsif
    }

    // Trigger visual flash/pulse pada kartu saat menerima update data
    function triggerCardFlash(cardId) {
        const card = document.getElementById(cardId);
        card.classList.add('updating');
        setTimeout(() => {
            card.classList.remove('updating');
        }, 300);
    }

    // Tangani data real-time dari Socket.io
    socket.on('traffic-data', (data) => {
        const rxRaw = data.rx;
        const txRaw = data.tx;

        // Visual flash trigger
        triggerCardFlash('incoming-card');
        triggerCardFlash('outgoing-card');

        // 1. Akumulasi Statistik Sesi
        sessionTickCount++;
        sessionRxTotal += rxRaw;
        sessionTxTotal += txRaw;

        if (rxRaw > rxPeakBytes) rxPeakBytes = rxRaw;
        if (txRaw > txPeakBytes) txPeakBytes = txRaw;

        const avgRxBytes = sessionRxTotal / sessionTickCount;
        const avgTxBytes = sessionTxTotal / sessionTickCount;

        // 2. Format Kecepatan Utama & Sekunder
        const rxPrimary = formatSpeed(rxRaw, primaryUnit);
        const txPrimary = formatSpeed(txRaw, primaryUnit);
        
        // Unit sekunder adalah kebalikan dari unit utama terpilih
        const secondaryUnitType = primaryUnit === 'Bytes' ? 'bits' : 'Bytes';
        const rxSecondary = formatSpeed(rxRaw, secondaryUnitType);
        const txSecondary = formatSpeed(txRaw, secondaryUnitType);

        // 3. Tampilkan Nilai Utama ke UI Card
        document.getElementById('rx-main-val').innerText = rxPrimary.value;
        document.getElementById('rx-main-unit').innerText = rxPrimary.unit;
        
        document.getElementById('tx-main-val').innerText = txPrimary.value;
        document.getElementById('tx-main-unit').innerText = txPrimary.unit;

        // 4. Tampilkan Nilai Sekunder ke UI Card (di bawah nilai utama)
        document.getElementById('rx-secondary-val').innerHTML = `<span style="font-family:'JetBrains Mono'">${rxSecondary.value}</span> ${rxSecondary.unit}`;
        document.getElementById('tx-secondary-val').innerHTML = `<span style="font-family:'JetBrains Mono'">${txSecondary.value}</span> ${txSecondary.unit}`;

        // 5. Tampilkan Statistik Sesi (Average & Peak) menggunakan unit primer terpilih
        const rxAvgFormatted = formatSpeed(avgRxBytes, primaryUnit);
        const txAvgFormatted = formatSpeed(avgTxBytes, primaryUnit);
        const rxPeakFormatted = formatSpeed(rxPeakBytes, primaryUnit);
        const txPeakFormatted = formatSpeed(txPeakBytes, primaryUnit);

        document.getElementById('rx-avg-val').innerText = rxAvgFormatted.display;
        document.getElementById('tx-avg-val').innerText = txAvgFormatted.display;
        document.getElementById('rx-peak-val').innerText = rxPeakFormatted.display;
        document.getElementById('tx-peak-val').innerText = txPeakFormatted.display;

        // 6. Update Grafik Real-Time
        rawRxPoints.push(rxRaw);
        rawTxPoints.push(txRaw);

        if (rawRxPoints.length > 20) rawRxPoints.shift();
        if (rawTxPoints.length > 20) rawTxPoints.shift();

        renderChartData();

        // 7. Update status koneksi & metadata badge (simulasi vs live)
        const badge = document.getElementById('conn-badge');
        const badgeText = document.getElementById('conn-status-text');

        badge.className = 'status-badge connected';
        if (data.simulated) {
            badge.classList.add('simulated');
            badgeText.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles" style="color:#ff9800"></i> Simulated (macOS)`;
        } else {
            badgeText.innerHTML = `<i class="fa-solid fa-ethernet" style="color:#00e676"></i> Live (${data.interface})`;
        }
    });

    // Tangani saat server terputus
    socket.on('disconnect', () => {
        const badge = document.getElementById('conn-badge');
        const badgeText = document.getElementById('conn-status-text');
        badge.className = 'status-badge';
        badgeText.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> Disconnected`;
    });
</script>
</body>
</html>
